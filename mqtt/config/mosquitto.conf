listener 1883
allow_anonymous false

persistence true
persistence_location /mosquitto/data/

log_dest stdout

acl_file /mosquitto/config/aclfile

# Enterprise dynamic auth
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_log_level info

# Do not cache auth decisions; expired JWTs must fail immediately on reconnect.
auth_opt_auth_cacheseconds 0
auth_opt_acl_cacheseconds 0
auth_opt_disable_superuser true

auth_opt_http_host host.docker.internal
auth_opt_http_port 5000
auth_opt_http_getuser_uri /api/v1/mqtt/validate
auth_opt_http_aclcheck_uri /api/v1/mqtt/validate
auth_opt_http_method post
auth_opt_http_params_mode json
auth_opt_http_response_mode status
auth_opt_http_register user,acl
