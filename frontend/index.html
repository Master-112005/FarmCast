<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- ======================================================
         CORE META (CRITICAL)
    ======================================================= -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ======================================================
         APPLICATION IDENTITY
    ======================================================= -->
    <title>FarmCast - Smart Farming Intelligence Platform</title>

    <meta
      name="description"
      content="FarmCast is an enterprise-grade smart agriculture platform for crop prediction, disease detection, and IoT-based farm monitoring."
    />
    <meta name="author" content="Rakesh" />
    <meta name="application-name" content="FarmCast" />
    <meta name="theme-color" content="#16a34a" />

    <!-- ======================================================
         FAVICON & ICONS
         (Must live inside /public)
    ======================================================= -->
    <link rel="icon" href="/profile-placeholder.svg" />
    <link rel="apple-touch-icon" href="/profile-placeholder.svg" />

    <!-- ======================================================
         FONTS (USED IN VARIABLES)
    ======================================================= -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- ======================================================
         LEAFLET (MAPS) - REQUIRED FOR DeviceMap.jsx
    ======================================================= -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- ======================================================
         SAFETY / POLISH
    ======================================================= -->
    <meta name="robots" content="index, follow" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>

  <body>
    <!-- ======================================================
         REACT ROOT (DO NOT RENAME)
    ======================================================= -->
    <div
      id="root"
      role="application"
      aria-label="FarmCast Application"
    ></div>

    <!-- ======================================================
         NO SCRIPT FALLBACK
    ======================================================= -->
    <noscript>
      <strong>
        FarmCast requires JavaScript to run. Please enable JavaScript in your
        browser.
      </strong>
    </noscript>

    <!-- ======================================================
         VITE ENTRY (CRITICAL)
         DO NOT CHANGE PATH
    ======================================================= -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
